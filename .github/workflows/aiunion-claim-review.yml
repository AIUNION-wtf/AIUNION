name: AIUNION Claim Review (event-driven)

# Triggered immediately when a claim or proposal change is committed,
# so reviews happen on submit instead of waiting for the daily 10:00 UTC cron.
# The daily cycle's review job remains as a safety net.

on:
  push:
    branches: [main]
    paths:
      - 'claims.json'
      - 'proposals.json'
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlap with itself; the daily cycle uses a different group.
concurrency:
  group: aiunion-claim-review
  cancel-in-progress: false

env:
  TREASURY_ADDRESS: bc1pjjmjypmzqgqkjxrhx0hpmaetlk75k04gh9hvkexmmfqyl5g7sjfsk4cge7

jobs:
  review:
    name: Review pending claims (on-submit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip when the bot itself is the author of the triggering commit, otherwise
    # the review job's own commit would re-trigger this workflow forever.
    # workflow_dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.author.name != 'AIUNION-wtf' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "AIUNION-wtf"
          git config user.email "AIUNION-wtf@users.noreply.github.com"
          git checkout main
          git pull --rebase origin main

      - name: Generate config.py
        env:
          AIUNION_OPENROUTER_API_KEY: ${{ secrets.AIUNION_OPENROUTER_API_KEY }}
        run: |
          python - <<'PY'
          import os
          with open("config.py", "w") as f:
              f.write(f'AIUNION_OPENROUTER_API_KEY = {os.environ["AIUNION_OPENROUTER_API_KEY"]!r}\n')
              f.write(f'TREASURY_ADDRESS = {os.environ["TREASURY_ADDRESS"]!r}\n')
          PY

      - name: Run review
        env:
          AIUNION_OPENROUTER_API_KEY: ${{ secrets.AIUNION_OPENROUTER_API_KEY }}
        run: python coordinator.py review
